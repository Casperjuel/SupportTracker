<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupportTracker — Download</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f8f6;
      color: #2c2c2a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 520px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #385C55;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 36px; height: 36px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-size: 15px;
      color: #5f5e5a;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #ee8250;
      color: #fff;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
      border: none;
      cursor: pointer;
    }
    .download-btn:hover { background: #d96f3f; }
    .download-btn:active { transform: scale(0.98); }
    .download-btn svg { width: 20px; height: 20px; }
    .meta {
      margin-top: 16px;
      font-size: 12px;
      color: #9a9890;
    }
    .meta a { color: #5f5e5a; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
    .features {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      text-align: left;
    }
    .feature {
      padding: 16px;
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 10px;
    }
    .feature-icon { font-size: 20px; margin-bottom: 6px; }
    .feature h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .feature p { font-size: 12px; color: #5f5e5a; line-height: 1.4; }
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #9a9890;
    }
    .footer a { color: #5f5e5a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9.506 2.34a10.195 10.195 0 0 1 6.48.421c1.975.81 3.638 2.22 4.751 4.023a.245.245 0 0 1-.089.341l-.682.39a.256.256 0 0 1-.343-.089 8.788 8.788 0 0 0-4.131-3.485 8.893 8.893 0 0 0-5.652-.367A8.816 8.816 0 0 0 5.13 6.69 8.668 8.668 0 0 0 3.31 12c0 1.92.64 3.787 1.82 5.31a8.817 8.817 0 0 0 4.71 3.116 8.894 8.894 0 0 0 5.652-.367 8.787 8.787 0 0 0 4.13-3.485.256.256 0 0 1 .344-.09l.682.39c.12.07.162.224.09.342a10.074 10.074 0 0 1-4.753 4.023c-2.054.842-4.331.99-6.479.42a10.106 10.106 0 0 1-5.399-3.571A9.936 9.936 0 0 1 2.02 12c0-2.201.734-4.341 2.087-6.088a10.106 10.106 0 0 1 5.399-3.571Z" fill="#fff"/>
        <path d="M8.85 7.78a5.405 5.405 0 0 1 3.02-1.093.241.241 0 0 1 .25.244v.776c0 .139-.112.25-.25.258-.81.05-1.589.336-2.235.828a4.04 4.04 0 0 0-1.459 2.16 4.005 4.005 0 0 0 .172 2.594 4.055 4.055 0 0 0 1.73 1.954 4.118 4.118 0 0 0 4.93-.643 4.028 4.028 0 0 0 1.16-2.33 4.005 4.005 0 0 0-.184-1.835.122.122 0 0 0-.176-.064l-1.103.63a.25.25 0 0 1-.34-.09l-.393-.674a.25.25 0 0 1 .092-.343l2.171-1.241a.25.25 0 0 1 .34.09l.198.34a5.275 5.275 0 0 1-.854 6.42 5.417 5.417 0 0 1-6.485.845 5.336 5.336 0 0 1-2.277-2.57 5.27 5.27 0 0 1-.226-3.413A5.317 5.317 0 0 1 8.85 7.78Z" fill="#fff"/>
        <path d="M12.12 11.149a.855.855 0 0 0-.86.851c0 .47.385.851.86.851s.86-.381.86-.851a.855.855 0 0 0-.86-.851Z" fill="#fff"/>
      </svg>
    </div>

    <h1>SupportTracker</h1>
    <p class="subtitle">
      Lokal supporttracker til dit team. Log henvendelser, se indsigter, og forebyg gentagne problemer.
    </p>

    <a href="https://github.com/Casperjuel/SupportTracker/releases/latest" class="download-btn" id="download-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="btn-text">Download til macOS</span>
    </a>
    <p class="meta" id="version-text">
      Gratis &middot; macOS &middot; <a href="https://github.com/Casperjuel/SupportTracker/releases/latest">Alle versioner</a> &middot; <a href="https://github.com/Casperjuel/SupportTracker">GitHub</a>
    </p>
    <p class="meta" style="margin-top: 8px; font-size: 11px;">
      Ved første åbning: højreklik appen → Åbn
    </p>

    <script>
      fetch('https://api.github.com/repos/Casperjuel/SupportTracker/releases/latest')
        .then(r => r.json())
        .then(release => {
          const dmg = release.assets?.find(a => a.name.endsWith('.dmg'));
          if (dmg) {
            document.getElementById('download-btn').href = dmg.browser_download_url;
            document.getElementById('btn-text').textContent = `Download ${release.tag_name} til macOS`;
          }
          if (release.tag_name) {
            document.getElementById('version-text').innerHTML =
              `${release.tag_name} &middot; Gratis &middot; macOS &middot; <a href="https://github.com/Casperjuel/SupportTracker/releases/latest">Alle versioner</a> &middot; <a href="https://github.com/Casperjuel/SupportTracker">GitHub</a>`;
          }
        })
        .catch(() => {});
    </script>

  </div>
</body>
</html>
